apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ .Release.Name }}-ingress
spec:
  rules:
    - host: interface.{{ .Release.Name }}.{{ .Values.host }}
      http:
        paths:
          - path: /
            pathType: ImplementationSpecific
            backend:
              {{- if semverCompare ">=1.19-0" $.Capabilities.KubeVersion.GitVersion }}
              service:
                name: {{ .Release.Name }}-interface-hyper-service
                port:
                  name: {{ .Release.Name }}-i-h-s-p
              {{- else }}
              serviceName: {{ .Release.Name }}-interface-hyper-service
              servicePort: {{ .Release.Name }}-i-h-s-p
              {{- end }}
    - host: application.{{ .Release.Name }}.{{ .Values.host }}
      http:
        paths:
          - path: /
            pathType: ImplementationSpecific
            backend:
              {{- if semverCompare ">=1.19-0" $.Capabilities.KubeVersion.GitVersion }}
              service:
                name: {{ .Release.Name }}-identity-hyper-service
                port:
                  name: {{ .Release.Name }}-a-h-s-p
              {{- else }}
              serviceName: {{ .Release.Name }}-identity-hyper-service
              servicePort: {{ .Release.Name }}-a-h-s-p
              {{- end }}
    - host: identity.{{ .Release.Name }}.{{ .Values.host }}
      http:
        paths:
          - path: /
            pathType: ImplementationSpecific
            backend:
              {{- if semverCompare ">=1.19-0" $.Capabilities.KubeVersion.GitVersion }}
              service:
                name: {{ .Release.Name }}-identity-hyper-service
                port:
                  name: {{ .Release.Name }}-id-h-s-p
              {{- else }}
              serviceName: {{ .Release.Name }}-identity-hyper-service
              servicePort: {{ .Release.Name }}-id-h-s-p
              {{- end }}
