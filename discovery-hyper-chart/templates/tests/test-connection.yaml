apiVersion: v1
kind: Pod
metadata:
  name: "{{ include "discovery-hyper-chart.fullname" . }}-test-connection"
  labels:
    {{- include "discovery-hyper-chart.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": test
spec:
  containers:
    - name: wget
      image: quay.io/coreos/etcd:v2.3.8
      command: ['etcdctl']
      args: ['--endpoints=http://{{ include "discovery-hyper-chart.fullname" . }}-discovery-hyper:{{ .Values.configuration.port }}', 'set', '/test', 'test']
  restartPolicy: Never
